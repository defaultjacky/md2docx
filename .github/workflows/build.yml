name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Trigger on tags for releases
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --all

  build-windows:
    runs-on: windows-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Copy pandoc binary
        run: |
          mkdir -p src-tauri/binaries
          # Download pandoc for Windows
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/jgm/pandoc/releases/download/3.4/pandoc-3.4-windows-x86_64.zip" -OutFile "pandoc.zip"
          Expand-Archive -Path "pandoc.zip" -DestinationPath "pandoc-extracted"
          Copy-Item "pandoc-extracted/pandoc-3.4/pandoc.exe" "src-tauri/binaries/pandoc-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "MD2Docx v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src-tauri/target/release/bundle/*

  build-macos-arm:
    runs-on: macos-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-apple-darwin

      - name: Copy pandoc binary
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o pandoc.tar.gz https://github.com/jgm/pandoc/releases/download/3.4/pandoc-3.4-macOS-arm64.tar.gz
          tar -xzf pandoc.tar.gz
          cp pandoc-3.4/pandoc src-tauri/binaries/pandoc-aarch64-apple-darwin

      - name: Build Tauri app (ARM64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin

      - name: Upload macOS ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/*

  build-macos-intel:
    runs-on: macos-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-apple-darwin

      - name: Copy pandoc binary
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o pandoc.tar.gz https://github.com/jgm/pandoc/releases/download/3.4/pandoc-3.4-macOS.tar.gz
          tar -xzf pandoc.tar.gz
          cp pandoc-3.4/pandoc src-tauri/binaries/pandoc-x86_64-apple-darwin

      - name: Build Tauri app (Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-apple-darwin

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/*

  build-linux:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              libjavascriptcoregtk-4.1-dev \
              libsoup-3.0-dev

      - name: Copy pandoc binary
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o pandoc.tar.gz https://github.com/jgm/pandoc/releases/download/3.4/pandoc-3.4-linux-amd64.tar.gz
          tar -xzf pandoc.tar.gz
          cp pandoc-3.4/pandoc src-tauri/binaries/pandoc-x86_64-unknown-linux-gnu

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-unknown-linux-gnu

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/*
